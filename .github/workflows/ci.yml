name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  macos-checks:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate fixtures
        run: python3 fixtures/generate_fixtures.py

      - name: Run Python tests
        run: PYTHONPATH=core/src python3 -m unittest discover -s core/tests -v

      - name: Build Swift shell
        run: swift build --package-path shell
